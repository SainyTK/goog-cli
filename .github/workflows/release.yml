name: Canonical Release

on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-preview.*"

permissions:
  contents: write

jobs:
  verify-tag:
    name: Verify tag source
    runs-on: ubuntu-latest
    outputs:
      release_channel: ${{ steps.channel.outputs.release_channel }}
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Require tag commit on channel base
        id: channel
        run: |
          case "$GITHUB_REF_NAME" in
            v[0-9]*.[0-9]*.[0-9]*-preview.[0-9]*)
              release_channel="preview"
              base_branch="preview"
              ;;
            v[0-9]*.[0-9]*.[0-9]*)
              release_channel="stable"
              base_branch="main"
              ;;
            *)
              echo "Tag must look like vX.Y.Z or vX.Y.Z-preview.N" >&2
              exit 1
              ;;
          esac

          git fetch origin "$base_branch"
          git merge-base --is-ancestor "$GITHUB_SHA" "origin/${base_branch}"
          echo "release_channel=${release_channel}" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.target }}
    needs: verify-tag
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-15
          - target: x86_64-apple-darwin
            os: macos-15-intel
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
      - name: Build release binary
        env:
          GOOG_BUILD_GIT_COMMIT: ${{ github.sha }}
          GOOG_BUILD_GIT_DIRTY: "false"
          GOOG_BUILD_GIT_DISTANCE: "0"
          GOOG_BUILD_SOURCE_TAG: ${{ github.ref_name }}
        run: cargo build --release --locked --target "${{ matrix.target }}"
      - name: Package release asset
        shell: bash
        run: |
          version="${GITHUB_REF_NAME}"
          asset="goog-${version}-${{ matrix.target }}.tar.gz"
          staging="$(mktemp -d)"
          cp "target/${{ matrix.target }}/release/goog" "$staging/goog"
          chmod 0755 "$staging/goog"
          tar -C "$staging" -czf "$asset" goog
      - name: Smoke test packaged binary
        shell: bash
        env:
          RELEASE_CHANNEL: ${{ needs.verify-tag.outputs.release_channel }}
        run: |
          asset="goog-${GITHUB_REF_NAME}-${{ matrix.target }}.tar.gz"
          scripts/verify-release-asset.sh \
            "$asset" \
            "$GITHUB_REF_NAME" \
            "$GITHUB_SHA" \
            "$RELEASE_CHANNEL" \
            "${{ matrix.target }}"
      - name: Generate packaged asset checksum
        shell: bash
        run: |
          asset="goog-${GITHUB_REF_NAME}-${{ matrix.target }}.tar.gz"
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$asset" > "$asset.sha256"
          else
            shasum -a 256 "$asset" > "$asset.sha256"
          fi
      - name: Upload packaged asset
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: |
            goog-${{ github.ref_name }}-${{ matrix.target }}.tar.gz
            goog-${{ github.ref_name }}-${{ matrix.target }}.tar.gz.sha256

  publish:
    name: Publish Canonical Release
    needs:
      - verify-tag
      - build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Download assets
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_CHANNEL: ${{ needs.verify-tag.outputs.release_channel }}
        run: |
          release_flag=""
          release_notes="Canonical Release for goog ${GITHUB_REF_NAME}."

          if [ "$RELEASE_CHANNEL" = "preview" ]; then
            release_flag="--prerelease"
            release_notes="Preview Release for goog ${GITHUB_REF_NAME}. This release is for opt-in validation before stable promotion."
          fi

          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "goog ${GITHUB_REF_NAME}" \
            --notes "$release_notes" \
            $release_flag \
            goog-"$GITHUB_REF_NAME"-*.tar.gz \
            goog-"$GITHUB_REF_NAME"-*.tar.gz.sha256
