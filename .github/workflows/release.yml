name: Canonical Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  verify-tag:
    name: Verify tag source
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Require tag commit on main
        run: |
          case "$GITHUB_REF_NAME" in
            v[0-9]*.[0-9]*.[0-9]*) ;;
            *) echo "Tag must look like vX.Y.Z" >&2; exit 1 ;;
          esac
          git fetch origin main
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main

  build:
    name: Build ${{ matrix.target }}
    needs: verify-tag
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-15
          - target: x86_64-apple-darwin
            os: macos-15-intel
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
      - name: Build release binary
        run: cargo build --release --locked --target "${{ matrix.target }}"
      - name: Package release asset
        shell: bash
        run: |
          version="${GITHUB_REF_NAME}"
          asset="goog-${version}-${{ matrix.target }}.tar.gz"
          staging="$(mktemp -d)"
          cp "target/${{ matrix.target }}/release/goog" "$staging/goog"
          chmod 0755 "$staging/goog"
          tar -C "$staging" -czf "$asset" goog
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$asset" > "$asset.sha256"
          else
            shasum -a 256 "$asset" > "$asset.sha256"
          fi
      - name: Upload packaged asset
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: |
            goog-${{ github.ref_name }}-${{ matrix.target }}.tar.gz
            goog-${{ github.ref_name }}-${{ matrix.target }}.tar.gz.sha256

  publish:
    name: Publish Canonical Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Download assets
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "goog ${GITHUB_REF_NAME}" \
            --notes "Canonical Release for goog ${GITHUB_REF_NAME}." \
            goog-"$GITHUB_REF_NAME"-*.tar.gz \
            goog-"$GITHUB_REF_NAME"-*.tar.gz.sha256

  update-homebrew-tap:
    name: Update Homebrew Tap
    needs: publish
    runs-on: ubuntu-latest
    if: ${{ vars.GOOG_HOMEBREW_TAP_REPO != '' }}
    steps:
      - name: Checkout application repository
        uses: actions/checkout@v4
        with:
          path: app
      - name: Checkout Homebrew tap
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.GOOG_HOMEBREW_TAP_REPO }}
          token: ${{ secrets.GOOG_HOMEBREW_TAP_TOKEN }}
          path: tap
      - name: Download release checksums
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p checksums
          gh release download "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern '*.sha256' \
            --dir checksums
      - name: Generate Formula/goog.rb
        run: |
          ruby app/scripts/render-homebrew-formula.rb "$GITHUB_REF_NAME" checksums > tap/Formula/goog.rb
      - name: Commit tap update
        working-directory: tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/goog.rb
          git commit -m "Update goog to ${GITHUB_REF_NAME}"
          git push
