[package]
name = "goog"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "goog"
path = "src/main.rs"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"
thiserror = "1"
anyhow = "1"
clap = { version = "4", features = ["derive"] }
dirs = "5"
dialoguer = "0.11"

[dev-dependencies]
tempfile = "3"
