[workspace]
members = [
    "goog-auth",
    "goog-drive",
    "goog",
]
resolver = "2"

[workspace.dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"
thiserror = "1"
anyhow = "1"
clap = { version = "4", features = ["derive"] }
dirs = "5"
dialoguer = "0.11"
